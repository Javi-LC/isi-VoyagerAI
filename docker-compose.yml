services:
  backend:
    build:
      context: ./backend
      network: host
    container_name: voyager-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: voyager-frontend
    environment:
      - VITE_BACKEND_URL=http://voyager-backend:8000
    ports:
      - "5173:5173"
    command:
      - /bin/sh
      - -c
      - "until wget -qO- http://voyager-backend:8000/api/v1/health >/dev/null 2>&1; do echo '[frontend] Esperando backend...'; sleep 3; done; exec npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
